name: Build and Release CyberSlacker

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86, arm64]

    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish Application
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          dotnet publish CyberSlacker/CyberSlacker.csproj `
            -c Release `
            -r win-${{ matrix.arch }} `
            --self-contained false `
            -p:PublishSingleFile=false `
            -p:Version=$ver `
            -o ./publish-${{ matrix.arch }}
     
      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix --version 6.0.2

      - name: Install WiX Extensions
        run: |
          wix extension add WixToolset.Netfx.wixext/6.0.2
          wix extension add WixToolset.Util.wixext/6.0.2
          
      - name: Enable Windows Installer Service
        shell: pwsh
        run: |
          Start-Service -Name "msiserver" -ErrorAction SilentlyContinue
      
      - name: Build Installer (WiX)
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          if ($ver -notmatch '^\d+\.\d+\.\d+') { $ver += ".0" }
          
          wix build Package.wxs `
            -ext WixToolset.Netfx.wixext/6.0.2 `
            -ext WixToolset.Util.wixext/6.0.2 `
            -culture zh-CN `
            -d AppVersion="$ver" `
            -d AppArch="${{ matrix.arch }}" `
            -arch ${{ matrix.arch }} `
            -o "Output/CyberSlacker_$($ver)_${{ matrix.arch }}.msi"

      - name: Generate XML
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')
          if ($ver -notmatch '^\d+\.\d+\.\d+') { $ver += ".0" }
          $arch = "${{ matrix.arch }}"
          
          $xmlContent = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <item>
              <version>$ver</version>
              <url>https://github.com/${{ github.repository }}/releases/download/$tag/CyberSlacker_${ver}_${arch}.msi</url>
              <changelog>https://github.com/${{ github.repository }}/releases/tag/$tag</changelog>
              <mandatory>true</mandatory>
          </item>
          "@
          $xmlContent | Set-Content -Path "Update_$arch.xml" -Encoding utf8

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: assets-${{ matrix.arch }}
          path: |
            Output/*.msi
            Update_${{ matrix.arch }}.xml

  # 发布任务
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Download all artifacts (MSIs and XMLs)
        uses: actions/download-artifact@v4
        with:
          pattern: assets-*
          path: ./temp_all
          merge-multiple: true

      - name: List Downloaded Files
        run: ls -R ./temp_all
      
      - name: Sync XML to Repo
        shell: pwsh
        run: |
          move -Force "./temp_all/Update_*.xml" "./"
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add Update_*.xml
          if ((git status --porcelain)) {
              git commit -m "chore: auto-update multi-arch manifests for ${{ github.ref_name }}"
              git push origin master
          }

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CyberSlacker ${{ github.ref_name }}
          body: |
            ## 📢 摸鱼员注意：赛博组件已进化！
            > "钱是老板的，命是自己的。" 
            本次版本更新已就绪，请各工位成员及时领取。
            
            ---
          generate_release_notes: true
          files: ./temp_all/Output/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

