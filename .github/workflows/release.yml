name: Build and Release CyberSlacker

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86, arm64]
    
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install WiX Toolset
      run: dotnet tool install --global wix --version 6.0.2

    # 1. 编译发布程序 (2MB 模式)
    - name: Publish Application
      run: |
        dotnet publish CyberSlacker/CyberSlacker.csproj `
          -c Release `
          -r win-${{ matrix.arch }} `
          --self-contained false `
          -o ./publish-${{ matrix.arch }}

    # 2. 物理隔离主 EXE，防止 WIX0369 重复定义
    - name: Isolate Main Executable
      shell: pwsh
      run: |
        mkdir ./exe-only-${{ matrix.arch }}
        move "./publish-${{ matrix.arch }}/CyberSlacker.exe" "./exe-only-${{ matrix.arch }}/"

    # 3. 【核心修复】启动 Windows Installer 服务，解决 WIX0001 (1631) 错误
    - name: Enable Windows Installer Service
      shell: pwsh
      run: net start msiserver || echo "Service already running or inaccessible"

    # 4. 构建 MSI
    - name: Build MSI
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        $ver = $tag.TrimStart('v')
        if ($ver -notmatch '^\d+\.\d+\.\d+') { $ver += ".0" }

        wix build Package.wxs `
          -d AppVersion="$ver" `
          -d AppArch="${{ matrix.arch }}" `
          -arch ${{ matrix.arch }} `
          -o "Output/CyberSlacker_$($ver)_${{ matrix.arch }}.msi"

        # 生成架构专属 XML (AutoUpdater.NET 用)
        if (-not (Test-Path "Update.xml")) {
            "<item><version>0.0.0</version><url></url></item>" | Out-File -FilePath "Update.xml" -Encoding utf8
        }
        [xml]$xml = Get-Content Update.xml
        $xml.item.version = $ver
        $xml.item.url = "https://github.com/${{ github.repository }}/releases/download/$tag/CyberSlacker_$($ver)_${{ matrix.arch }}.msi"
        $xml.Save("Update_${{ matrix.arch }}.xml")

    - name: Upload XML Artifact
      uses: actions/upload-artifact@v4
      with:
        name: xml-${{ matrix.arch }}
        path: Update_${{ matrix.arch }}.xml

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./Output/*.msi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-manifests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: master 
      - name: Download XMLs
        uses: actions/download-artifact@v4
        with:
          path: ./temp_xmls
          merge-multiple: true
      - name: Sync and Push
        run: |
          mv ./temp_xmls/Update_*.xml ./
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add Update_*.xml
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: update manifests for ${{ github.ref_name }}"
            git push origin master
          fi
          
  publish-winget:
    needs: sync-manifests
    runs-on: ubuntu-latest
    steps:
    - name: Submit to WinGet
      uses: vedantmgoyal9/winget-releaser@v2
      with:
        identifier: LaborLogic.CyberSlacker
        installers-regex: '.*\.msi$'
        token: ${{ secrets.WINGET_TOKEN }}