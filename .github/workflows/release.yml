name: Build and Release CyberSlacker

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86, arm64]

    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install WiX Toolset
        run: dotnet tool install --global wix --version 6.0.2

      # 1. 编译发布程序 (2MB 模式)
      - name: Publish Application
        run: |
          dotnet publish CyberSlacker/CyberSlacker.csproj `
            -c Release `
            -r win-${{ matrix.arch }} `
            --self-contained false `
            -o ./publish-${{ matrix.arch }}

      # 2. 物理隔离主 EXE，防止 WIX0369 重复定义
      - name: Isolate Main Executable
        shell: pwsh
        run: |
          mkdir ./exe-only-${{ matrix.arch }}
          move "./publish-${{ matrix.arch }}/CyberSlacker.exe" "./exe-only-${{ matrix.arch }}/"

      # 3. 【核心修复】启动 Windows Installer 服务，解决 WIX0001 (1631) 错误
      - name: Enable Windows Installer Service
        shell: pwsh
        run: net start msiserver || echo "Service already running or inaccessible"

      # 4. 构建 MSI
      - name: Build MSI
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          if ($ver -notmatch '^\d+\.\d+\.\d+') { $ver += ".0" }

          wix build Package.wxs `
            -d AppVersion="$ver" `
            -d AppArch="${{ matrix.arch }}" `
            -arch ${{ matrix.arch }} `
            -o "Output/CyberSlacker_$($ver)_${{ matrix.arch }}.msi"

      # 5. 将包存入暂存区
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-${{ matrix.arch }}
          path: Output/*.msi

  # 发布任务
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Download all MSIs
        uses: actions/download-artifact@v4
        with:
          pattern: msi-*
          path: ./all_msis
          merge-multiple: true

      - name: List Downloaded Files
        run: ls -R ./all_msis

      - name: Generate Arch-Specific XMLs
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          # 确保版本号是 x.y.z.w 格式
          if [[ ! $VER =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then VER="$VER.0"; fi
          
          ARCHS=("x64" "x86" "arm64")
          for ARCH in "${ARCHS[@]}"; do
            # 直接生成最简单的 XML 结构
            cat <<EOF > Update_$ARCH.xml
            <?xml version="1.0" encoding="UTF-8"?>
            <item>
                <version>$VER</version>
                <url>https://github.com/${{ github.repository }}/releases/download/$TAG/CyberSlacker_$ARCH.msi</url>
                <changelog>https://github.com/${{ github.repository }}/releases/tag/$TAG</changelog>
                <mandatory>false</mandatory>
            </item>
            EOF
          done

      # 4. 推送 XML 回仓库
      - name: Sync XML to Repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add Update_*.xml
          git commit -m "chore: auto-update multi-arch manifests for ${{ github.ref_name }}"
          git push origin main

      # 5. 【核心】使用 softprops 发布，关联生成的日志
      - name: Final Release
        uses: softprops/action-gh-release@v2
        with:
          name: CyberSlacker ${{ github.ref_name }}
          generate_release_notes: true
          files: ./all_msis/*.msi

  # 推送至 WinGet
  publish-winget:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Submit to WinGet
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: LaborLogic.CyberSlacker
          installers-regex: '.*\.msi$'
          token: ${{ secrets.WINGET_TOKEN }}
