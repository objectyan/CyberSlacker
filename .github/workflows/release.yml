name: Build and Release CyberSlacker

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86, arm64]

    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install WiX Toolset
        run: dotnet tool install --global wix --version 6.0.2

      # 1. 编译发布程序 (2MB 模式)
      - name: Publish Application
        run: |
          dotnet publish CyberSlacker/CyberSlacker.csproj `
            -c Release `
            -r win-${{ matrix.arch }} `
            --self-contained false `
            -o ./publish-${{ matrix.arch }}

      # 2. 物理隔离主 EXE，防止 WIX0369 重复定义
      - name: Isolate Main Executable
        shell: pwsh
        run: |
          mkdir ./exe-only-${{ matrix.arch }}
          move "./publish-${{ matrix.arch }}/CyberSlacker.exe" "./exe-only-${{ matrix.arch }}/"

      # 3. 【核心修复】启动 Windows Installer 服务，解决 WIX0001 (1631) 错误
      - name: Enable Windows Installer Service
        shell: pwsh
        run: net start msiserver || echo "Service already running or inaccessible"

      # 4. 构建 MSI
      - name: Build MSI
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          if ($ver -notmatch '^\d+\.\d+\.\d+') { $ver += ".0" }

          wix build Package.wxs `
            -d AppVersion="$ver" `
            -d AppArch="${{ matrix.arch }}" `
            -arch ${{ matrix.arch }} `
            -o "Output/CyberSlacker_$($ver)_${{ matrix.arch }}.msi"

      
      # 5. 生成架构专属的 XML
      - name: Generate Update XML
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')
          if ($ver -notmatch '^\d+\.\d+\.\d+') { $ver += ".0" }
          $arch = "${{ matrix.arch }}"
          
          $xmlContent = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <item>
              <version>$ver</version>
              <url>https://github.com/${{ github.repository }}/releases/download/$tag/CyberSlacker_$(ver)_$(arch).msi</url>
              <changelog>https://github.com/${{ github.repository }}/releases/tag/$tag</changelog>
              <mandatory>false</mandatory>
          </item>
          "@
          $xmlContent | Set-Content -Path "Update_$(arch).xml" -Encoding utf8

      
      # 5. 上传当前架构的 MSI 和 XML 到暂存区
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: assets-${{ matrix.arch }}
          path: |
            Output/*.msi
            Update_${{ matrix.arch }}.xml

  # 发布任务
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Download all artifacts (MSIs and XMLs)
        uses: actions/download-artifact@v4
        with:
          pattern: assets-*
          path: ./temp_all
          merge-multiple: true

      - name: List Downloaded Files
        run: ls -R ./temp_all

      # 推送 XML 回仓库
      - name: Sync XML to Repo
        shell: pwsh
        run: |
          move "./temp_all/Update_*.xml" "./"
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add Update_*.xml
          if ((git status --porcelain)) {
              git commit -m "chore: auto-update multi-arch manifests for ${{ github.ref_name }}"
              git push origin master
          }

      # 使用 softprops 发布，关联生成的日志
      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CyberSlacker ${{ github.ref_name }}
          body: |
            ## 📢 摸鱼员注意：赛博组件已进化！
            > "钱是老板的，命是自己的。" 
            本次版本更新已就绪，请各工位成员及时领取。
            
            ---
          generate_release_notes: true
          files: ./temp_all/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 推送至 WinGet
  publish-winget:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Submit to WinGet
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: LaborLogic.CyberSlacker
          installers-regex: '.*\.msi$'
          token: ${{ secrets.WINGET_TOKEN }}
